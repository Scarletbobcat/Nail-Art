spring.application.name=appointment-book

spring.config.import=optional:classpath:.env[.properties]

spring.profiles.active=dev

spring.datasource.url=${POSTGRES_URL}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.tenant_identifier_resolver=com.nail_art.appointment_book.multitenancy.CurrentTenantResolver
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

security.jwt.secret-key=${JWT_SECRET_KEY}
security.jwt.expiration-time=${JWT_EXPIRATION}

twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.phone.number=${TWILIO_PHONE_NUMBER}

# pgcrypto symmetric key for per-org Twilio auth tokens. No default: a missing
# key is a loud failed boot, never silent data corruption. Must match the value
# used by the Python scripts and stay stable over time.
app.encryption.key=${APP_ENCRYPTION_KEY}
