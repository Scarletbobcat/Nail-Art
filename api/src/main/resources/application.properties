spring.application.name=appointment-book

spring.config.import=optional:classpath:.env[.properties]

spring.profiles.active=dev

spring.data.mongodb.auto-index-creation=true

spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/nail_art}
spring.datasource.username=${POSTGRES_USER:nail_art}
spring.datasource.password=${POSTGRES_PASSWORD:nail_art_password}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

security.jwt.secret-key=${JWT_SECRET_KEY}
security.jwt.expiration-time=${JWT_EXPIRATION}

twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.phone.number=${TWILIO_PHONE_NUMBER}
