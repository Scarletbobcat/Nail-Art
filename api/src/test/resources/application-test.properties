spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.jpa.show-sql=false

frontend.url=http://localhost:5173
security.jwt.secret-key=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
security.jwt.expiration-time=3600000
JWT_REFRESH_EXPIRATION=2592000000

# Fixed pgcrypto key for tests. The no-default app.encryption.key in
# application.properties means the shared integration-test context fails to boot
# without this, so it must live here, not in any single test class.
app.encryption.key=test-encryption-key-0123456789

# Never emit analytics from the test suite - keeps the PostHog client bean out of
# the context entirely so ProductAnalytics no-ops.
posthog.enabled=false
