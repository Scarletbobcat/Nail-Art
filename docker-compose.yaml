services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nail_art}
      POSTGRES_USER: ${POSTGRES_USER:-nail_art}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nail_art_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nail_art} -d ${POSTGRES_DB:-nail_art}"]
      interval: 10s
      timeout: 5s
      retries: 5

  client:
    depends_on:
      - api
    image: scarletbobcat/nail-art:client
    platform: linux/arm64
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080

  api:
    image: scarletbobcat/nail-art:api
    platform: linux/arm64
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - POSTGRES_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-nail_art}
      - POSTGRES_USER=${POSTGRES_USER:-nail_art}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-nail_art_password}

volumes:
  postgres-data:
